</head>
<body>

        <a href="https://www.wattpad.com/user/kangelny" target="_blank">📖 Wattpad</a>
        <a href="https://www.facebook.com/groups/1541181573591650" target="_blank">👥 Group</a>
        <span style="margin-left: auto;">Welcome to KAngel's NY!</span>
    </div>
    <div class="read-box">
        <div class="os-window">
            <div class="os-title-bar"><span id="chapter-title">Chapter.txt - Notepad</span><div class="os-window-btn"><div class="os-btn-mini">X</div></div></div>
            <div class="os-content">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px;">
                    <a href="index.html" class="win-btn">🏠 Về Nhà</a>
                    <div>
                        <button id="prev-btn" class="win-btn">&lt; Prev</button>
                        <button onclick="toggleTOC()" class="win-btn">📑 Mục Lục</button>
                        <button id="next-btn" class="win-btn">Next &gt;</button>
                    </div>
                </div>
                <div id="story-content" class="story-content">Loading data...</div>
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px;">
                    <a id="back-to-novel" href="#" class="win-btn">Về Trang Truyện</a>
                    <div>
                        <button id="prev-btn-bottom" class="win-btn">&lt; Prev</button>
                        <button id="next-btn-bottom" class="win-btn">Next &gt;</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="os-window">
            <div class="os-title-bar"><span>Comments_Log.exe</span><div class="os-window-btn"><div class="os-btn-mini">X</div></div></div>
            <div class="os-content inner-box">
                <div id="HCB_comment_box">Loading comments...</div>
                <script type="text/javascript" id="hcb"> /*<!--*/ if(!window.hcb_user){hcb_user={};} (function(){var s=document.createElement("script"), l=hcb_user.PAGE || (""+window.location).replace(/'/g,"%27"), h="https://www.htmlcommentbox.com";s.setAttribute("type","text/javascript");s.setAttribute("src", h+"/jread?page="+encodeURIComponent(l).replace("+","%2B")+"&mod=%241%24wq1rdBcg%24FTA6jrgdpDVKJGcnVMJP9%2F"+"&opts=16798&num=10&ts=1778410925084");if (typeof s!="undefined") document.getElementsByTagName("head")[0].appendChild(s);})(); /*-->*/ </script>
            </div>
        </div>
    </div>
    <div class="toc-modal-overlay" id="toc-overlay" onclick="toggleTOC()"></div>
    <div class="os-window toc-modal" id="toc-modal">
        <div class="os-title-bar"><span>Directory_List.exe</span><div class="os-btn-mini" onclick="toggleTOC()">X</div></div>
        <div class="os-content inner-box" style="display: flex; flex-direction: column; gap: 5px;" id="modal-chapter-list">
        </div>
    </div>   
    <div id="anime-elevator" style="position:fixed; right:20px; bottom:60px; z-index:1000; cursor:pointer;" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">
        <img src="image/kangel4.png" width="60" style="border: 2px solid var(--primary-color);">
    </div>
    <div class="taskbar">
        <a href="index.html" style="text-decoration:none;"><div class="start-btn"><img src="image/pcak.png" width="16"> START</div></a>
        <div class="taskbar-tools">
            <select id="font-select" class="font-select" title="Đổi Font Chữ">
                <option value="'DotGothic16', sans-serif">Pixel</option>
                <option value="'Be Vietnam Pro', sans-serif">Be Vietnam</option>
                <option value="'Quicksand', sans-serif">Quicksand</option>
                <option value="'Mali', cursive">Mali</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Roboto', serif">Roboto</option>
                <option value="'Open sans', serif">Open sans</option>
                <option value="'Work sans', serif">Work sans</option>
                <option value="'Alegreya', serif">Alegreya</option>
            </select>
            <div id="theme-toggle" class="tool-btn">🌙</div>
            <div class="tool-btn">🎨<input type="color" id="bg-color"></div>
            <div class="tool-btn">📝<input type="color" id="read-text-color" title="Đổi Màu Chữ Truyện"></div>
            <div class="font-size-container" title="Chỉnh cỡ chữ">
            <span style="font-size:12px; color:black;">A</span>
            <input type="range" id="font-size-slider" min="14" max="30" value="16">
            <span style="font-size:18px; color:black;">A</span>
            </div>
            <div id="reset-colors" class="tool-btn">🔄</div>
        </div>
    </div>
    <script src="script.js"></script>
